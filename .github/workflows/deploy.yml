name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Test & Build Docker Image (Berjalan di GitHub, gratis)
  # ─────────────────────────────────────────────────────────────────
  test-and-build:
    name: Test & Build Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, gd, zip, bcmath, exif, pcntl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction

      - name: Copy .env for testing
        run: |
          cp .env.docker .env
          php artisan key:generate

      - name: Run PHPUnit Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test --stop-on-failure

      # ── Build & Push ke GHCR ─────────────────────────────────────
      - name: Login ke GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Setup Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image ke GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy ke VPS (hanya jika Job 1 ✅ dan push ke main)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy ke Production VPS
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH ke Biznet VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "──────────────────────────────────────"
            echo " HRIS Aratech — Production Deploy"
            echo " Commit: ${{ github.sha }}"
            echo "──────────────────────────────────────"

            # 1. Pull kode terbaru
            echo "[1/6] Pulling latest code..."
            git pull origin main

            # 2. Login ke GHCR dan pull image baru
            echo "[2/6] Pulling image dari GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest

            # 3. Rolling update — TANPA down, tanpa downtime
            echo "[3/6] Rolling update container (zero-downtime)..."
            IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7) \
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-deps --no-recreate app webserver

            # 4. Jalankan migrasi database
            echo "[4/6] Running database migrations..."
            docker compose exec -T app php artisan migrate --force --no-interaction

            # 5. Optimize cache Laravel
            echo "[5/6] Caching config, routes & views..."
            docker compose exec -T app php artisan optimize

            # 6. Fix permissions (BUKAN chmod 777)
            echo "[6/6] Setting correct permissions..."
            docker compose exec -T app sh /var/www/html/docker/fix-permissions.sh

            # 7. Hapus image lama untuk hemat disk
            docker image prune -f

            echo ""
            echo "✅ Deploy selesai — $(date)"
            echo "──────────────────────────────────────"
