services:

  # ─── PHP Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hris_app
    restart: unless-stopped
    environment:
      APP_NAME: "HRApp"
      APP_ENV: production
      APP_KEY: "${APP_KEY:-}"
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8000"

      LOG_CHANNEL: stack
      LOG_LEVEL: error

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hrappsprod
      DB_USERNAME: hris_user
      DB_PASSWORD: hris_secret

      CACHE_DRIVER: file
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
      SESSION_SECURE_COOKIE: "false"
      SESSION_HTTP_ONLY: "true"
      SESSION_SAME_SITE: lax
      QUEUE_CONNECTION: sync
      FILESYSTEM_DISK: public
    volumes:
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
      - ./resources/views:/var/www/html/resources/views
      - ./routes:/var/www/html/routes
      - ./app:/var/www/html/app
      - ./database:/var/www/html/database
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hris_network

  # ─── Nginx Web Server ──────────────────────────────────────────────────────
  webserver:
    image: nginx:1.25-alpine
    container_name: hris_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./public/build:/var/www/html/public/build
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hris_network

  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hris_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hrappsprod
      MYSQL_USER: hris_user
      MYSQL_PASSWORD: hris_secret
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # - ./hrapps_prod-lokal.sql:/docker-entrypoint-initdb.d/01_import.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hris_user", "-phris_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hris_network

volumes:
  mysql_data:
    driver: local

networks:
  hris_network:
    driver: bridge
